name: GitHub-Profile-Summary-Cards

on:
  create:
  push:
  schedule: # execute once a day at 00:00 UTC
    - cron: "0 0 * * *"
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    name: generate-github-cards
    permissions:
      contents: write
      
    steps:
      - uses: actions/checkout@v2
      - uses: vn7n24fzkq/github-profile-summary-cards@release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          USERNAME: ${{ github.repository_owner }}
      - name: Keepalive (prevent scheduled workflow auto-disable)
        run: |
          git fetch origin master --quiet
          LAST_COMMIT_TS=$(git log -1 --format=%ct origin/master)
          DAYS_SINCE=$(( ( $(date +%s) - LAST_COMMIT_TS ) / 86400 ))
          echo "Last commit on origin/master was $DAYS_SINCE days ago"
          if [ "$DAYS_SINCE" -ge 50 ]; then
            git config user.name "keepalive-bot"
            git config user.email "keepalive-bot@users.noreply.github.com"
            git checkout master
            git pull --rebase origin master
            git commit --allow-empty -m "chore: keepalive"
            git push origin master
          fi
